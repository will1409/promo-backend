services:
  - type: web
    name: pegue-a-promo-api
    runtime: node
    buildCommand: chmod +x ./render-build.sh && ./render-build.sh && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false   # Você preencherá esse valor no painel do Render
